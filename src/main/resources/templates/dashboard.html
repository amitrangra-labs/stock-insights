<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard &middot; Stock Insights</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
    <main class="container container--wide">
        <header class="page-head">
            <h1>Dashboard</h1>
            <a class="back-link" th:href="@{/}">&larr; Home</a>
        </header>

        <p class="muted">
            Prices are served from a local cache refreshed in the background, so they may lag the
            live market. A dash (&mdash;) means no data has been cached yet.
        </p>

        <form class="add-ticker" method="post" th:action="@{/watchlist}">
            <input type="text" name="ticker" placeholder="Add a ticker (e.g. TSLA)"
                   aria-label="Ticker symbol" maxlength="16" autocomplete="off" required>
            <button type="submit">Add</button>
        </form>

        <table class="quotes">
            <thead>
                <tr>
                    <th>Ticker</th>
                    <th>Name</th>
                    <th class="num">Price</th>
                    <th class="num">Change</th>
                    <th class="num">Change %</th>
                    <th>As of</th>
                    <th><span class="visually-hidden">Actions</span></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="row : ${rows}">
                    <td class="ticker">
                        <a th:href="@{/stocks/{t}(t=${row.ticker})}" th:text="${row.ticker}">AAPL</a>
                    </td>
                    <td th:text="${row.name}">Apple Inc</td>
                    <td class="num" th:text="${row.hasQuote()} ? ${#numbers.formatDecimal(row.price,1,2)} : '—'">0.00</td>
                    <td class="num"
                        th:classappend="${row.hasQuote()} ? (${row.isUp()} ? ' up' : ' down') : ''"
                        th:text="${row.hasQuote()} ? ${#numbers.formatDecimal(row.change,1,2)} : '—'">0.00</td>
                    <td class="num"
                        th:classappend="${row.hasQuote()} ? (${row.isUp()} ? ' up' : ' down') : ''"
                        th:text="${row.hasQuote()} ? ${#numbers.formatDecimal(row.percentChange,1,2)} + '%' : '—'">0.00%</td>
                    <td class="muted" th:text="${row.asOfDisplay()}">—</td>
                    <td class="actions">
                        <form method="post" th:action="@{/watchlist/{t}/remove(t=${row.ticker})}">
                            <button type="submit" class="remove-btn"
                                    th:attr="aria-label='Remove ' + ${row.ticker}" title="Remove">&times;</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(rows)}">
                    <td colspan="7" class="muted">Your watchlist is empty. Add a ticker above.</td>
                </tr>
            </tbody>
        </table>
    </main>
</body>
</html>
