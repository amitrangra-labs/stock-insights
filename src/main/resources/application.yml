spring:
  application:
    name: stock-insights

  # File-based H2 so cached market data survives restarts. Swap to Postgres later
  # by changing these properties + the driver dependency; no code changes needed.
  datasource:
    url: jdbc:h2:file:./data/stock-insights;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  # Create the cache tables from schema.sql on startup (idempotent: CREATE ... IF NOT EXISTS).
  sql:
    init:
      mode: always
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

# Application-specific config. API keys are read from environment variables so they
# are never committed. See .env.example for the full list.
stock-insights:
  # Seed watchlist used on first start only (the watchlist is user-editable after that).
  # Kept to 10 so a fresh install with a Finnhub key stays within the free-tier rate
  # limit (see refresh settings below). Add more via the dashboard search box.
  tracked-tickers:
    - NVDA
    - AAPL
    - MSFT
    - GOOGL
    - AMZN
    - META
    - AVGO
    - TSLA
    - SPY   # ETF: S&P 500
    - QQQ   # ETF: Nasdaq 100
  # Background refresh cadences (Journey A). Two tiers keep us under free-tier limits:
  #  - "live" (quote + news) runs often, since these change intraday.
  #  - "reference" (profile, fundamentals, analyst ratings, price history) runs daily,
  #    since these barely change during the day.
  # Initial delays let the app finish starting before the first fetch.
  refresh-interval-ms: 300000                 # live: every 5 min
  refresh-initial-delay-ms: 10000
  reference-refresh-interval-ms: 86400000     # reference: every 24 h
  reference-refresh-initial-delay-ms: 20000
  # How often to rebroadcast the latest cached quotes to live (SSE) clients, so the
  # dashboard auto-updates even without the real-time WebSocket.
  snapshot-broadcast-interval-ms: 12000
  snapshot-broadcast-initial-delay-ms: 15000
  market-data:
    # Quotes, profiles, fundamentals, ratings, news (needs a free API key).
    finnhub:
      base-url: https://finnhub.io/api/v1
      # Real-time trade stream (needs the same API key; free tier includes it).
      ws-url: wss://ws.finnhub.io
      api-key: ${FINNHUB_API_KEY:}
      # Minimum gap between Finnhub calls. The free tier allows 60/min; ~1.1s spacing
      # caps us at ~54/min so bursts (refresh + on-add) never trip the limit. Set 0 to disable.
      min-call-interval-ms: 1100
    # Daily price history (keyless). We cache the full 5y window so the detail-page
    # chart can zoom from 1 month out to 5 years without any extra fetch.
    yahoo:
      base-url: https://query1.finance.yahoo.com
      range: 5y
      interval: 1d
    alpha-vantage:
      base-url: https://www.alphavantage.co/query
      api-key: ${ALPHA_VANTAGE_API_KEY:}
