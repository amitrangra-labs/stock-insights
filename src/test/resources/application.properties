# Test overrides: in-memory H2 (no files written) and a refresh delay long enough
# that the background scheduler never fires during a test run.
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.sql.init.mode=always
stock-insights.refresh-initial-delay-ms=3600000
