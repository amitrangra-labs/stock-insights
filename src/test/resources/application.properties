# Test overrides: in-memory H2 (no files written) and refresh delays long enough
# that the background schedulers never fire during a test run. Throttle disabled.
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.sql.init.mode=always
stock-insights.refresh-initial-delay-ms=3600000
stock-insights.reference-refresh-initial-delay-ms=3600000
stock-insights.market-data.finnhub.min-call-interval-ms=0
