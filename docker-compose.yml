# One-command local run:  docker compose up --build
# Reads FINNHUB_API_KEY / ALPHA_VANTAGE_API_KEY from your shell or a local .env file.
services:
  app:
    build: .
    image: stock-insights:latest
    ports:
      - "8080:8080"
    environment:
      FINNHUB_API_KEY: ${FINNHUB_API_KEY:-}
      ALPHA_VANTAGE_API_KEY: ${ALPHA_VANTAGE_API_KEY:-}
    volumes:
      # Persist the H2 cache across container restarts.
      - stock-insights-data:/app/data
    restart: unless-stopped

volumes:
  stock-insights-data:
