# One-command local run:  docker compose up --build
# Reads FINNHUB_API_KEY / ALPHA_VANTAGE_API_KEY from your shell or a local .env file.
services:
  app:
    build: .
    image: stock-insights:latest
    ports:
      - "8080:8080"
    environment:
      FINNHUB_API_KEY: ${FINNHUB_API_KEY:-}
      ALPHA_VANTAGE_API_KEY: ${ALPHA_VANTAGE_API_KEY:-}
      # The container's H2 URL (no AUTO_SERVER) is baked into the image; override here if needed.
    volumes:
      # Persist the H2 cache across container restarts.
      - stock-insights-data:/app/data
    # Don't auto-restart: if the app crashes it stays down (logs readable, cleanly
    # removable) instead of crash-LOOPING, which can leave Docker Desktop unable to
    # manage/remove the stack ("Max retries … ECONNREFUSED"). For a long-running
    # deployment you can switch this to "unless-stopped".
    restart: "no"
    # Give the JVM time to flush H2 and shut down cleanly (avoids stale DB locks).
    stop_grace_period: 30s
    # The image defines a HEALTHCHECK (GET /health), so `docker compose ps` shows health.

  # Time-series database + scraper. Pulls /actuator/prometheus from the app every 15s,
  # stores the samples, and evaluates the SLO recording/alerting rules.
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=90d
    restart: unless-stopped
    depends_on:
      - app

  # Dashboards. Datasource + the SLO dashboard are provisioned from disk (dashboards-as-code).
  # Anonymous read-only + embedding are enabled so the app's /observability page can iframe it;
  # this is a local-demo posture — put Grafana behind SSO/a reverse proxy for any real deployment.
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_USERS_DEFAULT_THEME: "light"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    restart: unless-stopped
    depends_on:
      - prometheus

volumes:
  stock-insights-data:
  prometheus-data:
  grafana-data:
